# Place this file at: .github/workflows/risk.yml
#
# Setup (one time):
#   1. Repo → Settings → Secrets and variables → Actions → New repository secret
#      Name: FRED_API_KEY   (free key from https://fred.stlouisfed.org/docs/api/api_key.html)
#   2. Settings → Actions → General → Workflow permissions → "Read and write permissions"
#   3. Commit risk_model.py, fetch_risk.py, backtest.py, requirements.txt to the repo root.
#   4. (Optional) add overrides.json for CAPE / P/E / P/B / Korea margin etc.
#
# The dashboard then reads the committed risk_data.json (point its refresh at the
# Pages URL of that file instead of the web-search call).

name: risk-data

on:
  schedule:
    - cron: "0 11 * * 1-5"   # 11:00 UTC, weekdays (after US close + Asia data)
  workflow_dispatch:          # manual "Run workflow" button
    inputs:
      run_backtest:
        description: "Also run the backtest"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch live readings
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_risk.py

      - name: Run backtest (optional)
        if: ${{ inputs.run_backtest }}
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python backtest.py

      - name: Commit refreshed data
        run: |
          git config user.name  "risk-bot"
          git config user.email "risk-bot@users.noreply.github.com"
          git add risk_data.json backtest_results.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: refresh $(date -u +%FT%TZ) [skip ci]"
          git push
